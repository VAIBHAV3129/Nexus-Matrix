<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS-MATRIX // PROTOTYPE</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="shell">
        <header id="bar">
            <div class="group">
                <span class="label">COORD:</span>
                <span id="coord-val" class="value">0, 0</span>
            </div>
            <div class="group">
                <span class="label">NODES:</span>
                <span id="node-val" class="value">0</span>
            </div>
            <div class="group">
                <input type="checkbox" id="toggle-gen" checked>
                <span class="label">AUTO_GEN</span>
            </div>
            <div class="group">
                <button id="undo-btn" class="ui-btn">UNDO</button>
                <button id="redo-btn" class="ui-btn">REDO</button>
                <button id="clear-btn" class="ui-btn">ERASE</button>
            </div>
            <div class="group">
                <button id="zoom-out" class="ui-btn">-</button>
                <button id="zoom-in" class="ui-btn">+</button>
                <input type="number" id="rot-val" value="0" step="15" class="ui-input">
                <span class="label">DEG</span>
            </div>
            <div class="group">
                <button id="export-btn" class="ui-btn">EXPORT</button>
                <button id="import-btn" class="ui-btn">IMPORT</button>
                <input type="file" id="import-input" style="display:none" accept=".json">
            </div>
            <div class="group" style="margin-left: auto;">
                <button id="save-btn" class="ui-btn">SAVE_PNG</button>
            </div>
        </header>
        <div id="view">
            <canvas id="canvas"></canvas>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
